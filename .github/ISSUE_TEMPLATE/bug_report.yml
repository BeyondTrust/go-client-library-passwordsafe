name: Bug Report
description: Report a problem with the Password Safe Go client library.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please do not include
        secrets, access tokens, certificates, or other sensitive values in this report.
  - type: input
    id: library-version
    attributes:
      label: Library version
      description: The version of `github.com/BeyondTrust/go-client-library-passwordsafe` you are using.
      placeholder: "e.g. 1.3.2"
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`.
      placeholder: "e.g. go1.24.0"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal Go snippet and the steps to reproduce. Redact any sensitive values.
      render: go
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Any relevant log output. Redact any sensitive values.
      render: shell
    validations:
      required: false
