version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - "**/*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
      exclude:
        - "beyondtrust/*"
        - "BeyondTrust/*"
    groups:
      minor-gomod:
        update-types:
          - minor
          - patch
      major-gomod:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
      exclude:
        - "beyondtrust/*"
        - "BeyondTrust/*"
    groups:
      minor-gh-actions:
        update-types:
          - minor
          - patch
      major-gh-actions:
        update-types:
          - major
