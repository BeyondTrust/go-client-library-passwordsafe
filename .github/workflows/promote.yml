name: Promote Candidate Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  sbom:
    name: Bill of Materials
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate SBOM
        uses: advanced-security/sbom-generator-action@6fe43abf522b2e7a19bc769aec1e6c848614b517 # v0.0.2
        id: sbom
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Attach SBOM
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.sbom.outputs.fileName }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

  promote-jfrog-prod:
    name: Promote to Jfrog's Prod environment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Generate App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_BT_ACTIONS_READER_APP_ID }}
          private-key: ${{ secrets.GH_APP_BT_ACTIONS_READER_PEM }}
          owner: BeyondTrust

      - name: Checkout setup-jfrog-cli action
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: "BeyondTrust/setup-jfrog-cli"
          ref: "26d84636538c322aed2f822374a0b976b23caa81" # v2.4.3
          token: ${{ steps.app-token.outputs.token }}
          path: ./.github/actions/setup-jfrog-cli

      - name: Setup JFrog
        uses: ./.github/actions/setup-jfrog-cli
        id: configure
        with:
          oidc-provider-name: "go-client-library-passwordsafe"

      - name: Promote release bundle
        run: |
          RELEASE_BUNDLE_NAME="${{ github.event.repository.name }}"
          TAG="${{ github.event.release.tag_name }}"

          if [[ "$TAG" =~ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            SEMVER_VERSION="${BASH_REMATCH[1]}"
          else
            echo "Could not extract semantic version from tag: $TAG"
            exit 1
          fi

          RELEASE_BUNDLE_VERSION=$(jf rt curl "/api/v2/release_bundle/records/$RELEASE_BUNDLE_NAME" \
            | jq -r --arg version "$SEMVER_VERSION" \
              '.release_bundles[] | select(.release_bundle_version | startswith($version)) | .release_bundle_version' \
            | head -n 1)

          jf rbp --signing-key="${{ steps.configure.outputs.evidence-signing-key-name }}" \
            "$RELEASE_BUNDLE_NAME" "$RELEASE_BUNDLE_VERSION" "PROD"

  publish-pkg-go-dev:
    name: Publish to pkg.go.dev
    runs-on: ubuntu-latest
    needs: [promote-jfrog-prod]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Trigger pkg.go.dev indexing
        run: GOPROXY=proxy.golang.org go list -m "github.com/BeyondTrust/go-client-library-passwordsafe@${{ github.event.release.tag_name }}"
