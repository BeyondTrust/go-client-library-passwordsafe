name: "Build artifacts before release"

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-service:
    #if: ${{ github.actor == 'beyondtrust-release-app[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      JF_ENV_1: ${{ secrets.ARTIFACTORY_DEPLOYER }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup JFrog
        uses: beyondtrust/setup-jfrog-cli@26d84636538c322aed2f822374a0b976b23caa81 # v2.4.3
        id: configure

      - name: Retrieve version
        id: info
        run: |
          echo "version=$(grep -oP '[\d]+\.[\d]+\.[\d]+' version.txt)" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build library
        run: |
          jf go mod download
          jf go mod tidy
          go build

      - name: Scan dependencies
        uses: beyondtrust/dependency-vulnerability-scan@f263be345e51426f77ca2a8fc73c8b481d3e5062 # v3.0.9

      - name: Publish to JFrog
        run: |
          mkdir -p beyondtrust/passwordsafe/go-library-passwordsafe/${{ steps.info.outputs.version }}
          cp go-client-library-passwordsafe beyondtrust/passwordsafe/go-library-passwordsafe/${{ steps.info.outputs.version }}/
          jf rt u "beyondtrust/passwordsafe/go-library-passwordsafe/${{ steps.info.outputs.version }}/*" eng-go-qa-local

      - name: Create JFrog Release Bundle
        id: release-bundle
        shell: bash
        run: |
          cat > /tmp/go_spec.json << EOF
          {
            "files": [
              {
                "pattern": "eng-go-qa-local/beyondtrust/passwordsafe/go-library-passwordsafe/${{ steps.info.outputs.version }}/*"
              }
            ]
          }
          EOF

          jf rbc --signing-key="${{ steps.configure.outputs.evidence-signing-key-name }}" \
            "${{ steps.configure.outputs.build-name }}" "${{ steps.info.outputs.version }}-${{ github.run_number }}" \
            --spec=/tmp/go_spec.json

  build-validate:
    runs-on: ubuntu-latest
    needs: [build-service]
    permissions:
      security-events: read
    steps:
      - name: Validate security center
        uses: beyondtrust/security-validation-action@6a9cc1a4f0e5cc4650e3423430cfb56942f6bd7e # v2.2.0
